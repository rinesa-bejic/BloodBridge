<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BloodBridge - Request Confirmed</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        body { 
            font-family: 'Inter', sans-serif;
            background: #f1e6e6; 
            display: flex; 
            justify-content: center; 
            align-items: center; 
            height: 100vh; 
            margin: 0; 
            padding: 20px;
            box-sizing: border-box;
            overflow: hidden;
        }

        .card { 
            background: rgba(255, 255, 255, 0.75); 
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            padding: 50px 40px; 
            border-radius: 28px; 
            border: 1px solid rgba(255, 255, 255, 0.6);
            box-shadow: 0 20px 40px rgba(29, 53, 87, 0.06), 
                        0 1px 3px rgba(0, 0, 0, 0.02); 
            text-align: center; 
            max-width: 460px; 
            width: 100%;
            box-sizing: border-box;
            animation: fadeInCard 0.6s cubic-bezier(0.16, 1, 0.3, 1);
        }

        
        .success-icon-wrapper {
            width: 80px;
            height: 80px;
            background: linear-gradient(135deg, #ffccd5 0%, #ffeef0 100%);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto 28px auto;
            box-shadow: 0 8px 20px rgba(230, 57, 70, 0.15);
            animation: scaleIn 0.5s cubic-bezier(0.34, 1.56, 0.64, 1) 0.2s backwards;
        }

        .success-icon {
            color: #e63946;
            font-size: 36px;
            line-height: 1;
        }

        h1 { 
            color: #1d3557; 
            font-size: 30px;
            font-weight: 800;
            margin-top: 0;
            margin-bottom: 12px; 
            letter-spacing: -0.5px;
        }

        p { 
            color: #526075; 
            font-size: 16px; 
            line-height: 1.6; 
            margin-bottom: 28px;
        }

        strong {
            color: #1d3557;
            font-weight: 700;
            background: linear-gradient(120deg, rgba(230, 57, 70, 0.15) 0%, rgba(230, 57, 70, 0.05) 100%);
            padding: 2px 6px;
            border-radius: 6px;
        }

        .coords-badge {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            background-color: rgba(29, 53, 87, 0.05);
            color: #1d3557;
            font-family: 'Courier New', Courier, monospace;
            font-weight: 600;
            font-size: 13px;
            padding: 8px 16px;
            border-radius: 12px;
            margin-bottom: 32px;
            border: 1px solid rgba(29, 53, 87, 0.03);
        }

        .btn { 
            display: flex;
            justify-content: center;
            align-items: center;
            background: linear-gradient(135deg, #1d3557 0%, #112237 100%);
            color: #ffffff; 
            padding: 16px 32px; 
            border-radius: 14px; 
            text-decoration: none; 
            font-weight: 600; 
            font-size: 16px;
            box-shadow: 0 6px 20px rgba(29, 53, 87, 0.25);
            transition: all 0.25s ease; 
        }

        .btn:hover { 
            background: linear-gradient(135deg, #223e66 0%, #1d3557 100%);
            transform: translateY(-3px);
            box-shadow: 0 8px 25px rgba(29, 53, 87, 0.35);
        }

        .btn:active {
            transform: translateY(-1px);
        }

        
        @keyframes fadeInCard {
            from { opacity: 0; transform: translateY(30px); }
            to { opacity: 1; transform: translateY(0); }
        }

        @keyframes scaleIn {
            from { opacity: 0; transform: scale(0.5); }
            to { opacity: 1; transform: scale(1); }
        }
    </style>
</head>
<body>
    <div class="card">
        <div class="success-icon-wrapper">
            <span class="success-icon">✓</span>
        </div>
        
        <h1>Request Posted!</h1>
        <p>Your blood request for <strong id="locName">the facility</strong> has been broadcasted successfully.</p>
        
        <div id="coords" class="coords-badge"></div>
        
        <a href="map_dashboard.html" id="mapLink" class="btn">View Live Map</a>
    </div>

    <script>
        const urlParams = new URLSearchParams(window.location.search);
        if (urlParams.has('location')) {
            document.getElementById('locName').innerText = urlParams.get('location');
        }
        if (urlParams.has('lat') && urlParams.has('lng')) {
            const latShort = parseFloat(urlParams.get('lat')).toFixed(5);
            const lngShort = parseFloat(urlParams.get('lng')).toFixed(5);
            
            document.getElementById('coords').innerHTML = `location: ${latShort}, ${lngShort}`;
            document.getElementById('mapLink').href = "map_dashboard.html" + window.location.search;
        } else {
            document.getElementById('coords').style.display = 'none';
        }
    </script>
</body>
</html>
